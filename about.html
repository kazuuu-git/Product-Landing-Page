<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="lpstyles.css">
    <title>About - AquaFlask</title>
</head>
<body class="about-page-wrapper">

    <div class="heading">
        <header>
            <img src="media/logo.png" alt="AquaFlask Logo" class="logo">
            <nav>
                <ul class="nav-links">
                    <li><a href="landingpage.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="landingpage.html#contacts">Contact</a></li>
                </ul>
            </nav>
            
            <div class="cart-icon-container" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="white" class="bi bi-cart3" viewBox="0 0 16 16">
                  <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                </svg>
                <span class="cart-count">0</span>
            </div>
        </header>
    </div>

    <div class="about-content">
        <p>This is the About page</p>
    </div>

    <footer class="gradient-footer" id="contacts">
        <div class="footer-logo-container">
            <img src="media/logo.png" alt="AquaFlask Logo" class="footer-logo">
        </div>
        <nav>
            <ul class="footer-links">
                <li><a href="landingpage.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="products.html">PRODUCTS</a></li>
                <li><a href="landingpage.html#contacts">CONTACT</a></li>
            </ul>
        </nav>
        <p class="footer-hashtag">#KeepItAquaFlask</p>
        <ul class="social-media">
            <li><a href="https://web.facebook.com/AquaFlaskPhOfficial/?_rdc=1&_rdr#"><img src="media/fblogo.png" alt="Facebook"></a></li>
            <li><a href="https://x.com/Aquaflask_japan"><img src="media/xlogo.png" alt="Twitter"></a></li>
            <li><a href="https://www.instagram.com/aquaflask.ph/?hl=en"><img src="media/iglogo.png" alt="Instagram"></a></li>
        </ul>
        <div class="footer-bottom">
            <p>&copy; 2024 AquaFlask. All rights reserved.</p>
        </div>
    </footer>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="cartOffcanvasLabel" style="color: #13237e; font-weight: bold;">Your Cart</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div id="cart-items-container">
                <p style="color: #666;">Your cart is empty.</p>
            </div>
            <hr>
            <div style="display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 20px;">
                <strong>Total:</strong> <strong id="cart-total-price">₱0.00</strong>
            </div>
            <button class="submit-btn" style="border-radius: 30px;">Checkout</button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('aquaFlaskCart')) || [];
        
        document.addEventListener('DOMContentLoaded', () => {
            updateCartUI();
        });

        document.querySelectorAll('.add-to-cart').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault(); 
                
                const name = this.getAttribute('data-name');
                const price = parseFloat(this.getAttribute('data-price'));
                const img = this.getAttribute('data-img');

                cart.push({ name, price, img });
                localStorage.setItem('aquaFlaskCart', JSON.stringify(cart));
                updateCartUI();
                
                const cartOffcanvas = new bootstrap.Offcanvas(document.getElementById('cartOffcanvas'));
                cartOffcanvas.show();
            });
        });

        function updateCartUI() {
            const cartContainer = document.getElementById('cart-items-container');
            const cartCount = document.querySelector('.cart-count');
            const cartTotal = document.getElementById('cart-total-price');

            if (!cartContainer || !cartCount || !cartTotal) return;

            cartCount.innerText = cart.length;
            cartContainer.innerHTML = '';

            if (cart.length === 0) {
                cartContainer.innerHTML = '<p style="color: #666;">Your cart is empty.</p>';
                cartTotal.innerText = '₱0.00';
                return;
            }

            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                cartContainer.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">₱${item.price.toFixed(2)}</div>
                        </div>
                        <button class="remove-item" onclick="removeFromCart(${index})">&times;</button>
                    </div>
                `;
            });

            cartTotal.innerText = `₱${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('aquaFlaskCart', JSON.stringify(cart));
            updateCartUI();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
